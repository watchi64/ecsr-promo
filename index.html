<!doctype html>
<html lang="fr" data-accent="brique">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1A1612" />
  <meta name="referrer" content="no-referrer" />
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' https://esm.sh;
    connect-src 'self' https://*.supabase.co https://esm.sh;
    img-src 'self' data: https://*.supabase.co;
    style-src 'self' 'unsafe-inline';
    font-src 'self' data:;
    base-uri 'self';
    form-action 'self';
    frame-ancestors 'none';
  ">
  <title>TP ECSR App</title>

  <!-- Polices auto-hébergées (RGPD : aucun appel Google Fonts) -->
  <link rel="stylesheet" href="css/fonts.css?v=20260723e" />
  <link rel="stylesheet" href="css/style.css?v=20260723e" />
  <link rel="stylesheet" href="css/livret.css?v=20260723e" />
  <link rel="icon" href="assets/logo/tpecsr-logo.svg" type="image/svg+xml" />
  <!-- Écran d'accueil iOS : Safari n'accepte pas de SVG et rend la transparence en noir.
       PNG 180x180 opaque (pictogramme clair sur le fond espresso de l'app), coins laissés
       carrés — iOS applique lui-même son masque arrondi. Généré depuis le logo SVG. -->
  <link rel="apple-touch-icon" sizes="180x180" href="assets/logo/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="TP ECSR" />
</head>
<body>

  <!-- Password gate -->
  <div id="gate" class="gate hidden">
    <div class="gate-bg" aria-hidden="true"></div>
    <div class="gate-card">
      <img class="gate-logo" src="assets/logo/tpecsr-logo.svg" alt="TP ECSR" />
      <p class="eyebrow">Promo · 2026</p>
      <h1>Bienvenue</h1>
      <div class="gate-tabs" role="tablist">
        <button class="gate-tab active" id="gate-tab-signin" role="tab" type="button">Connexion</button>
        <button class="gate-tab" id="gate-tab-signup" role="tab" type="button">Créer un compte</button>
      </div>
      <p class="muted" id="gate-subtitle">Entre ton email et ton mot de passe.</p>
      <div class="gate-form">
        <input type="email" id="gate-email" placeholder="ton.email@exemple.fr" autocomplete="email" />
        <input type="password" id="gate-password" placeholder="Mot de passe (min. 6 caractères)" autocomplete="current-password" />
        <button id="gate-submit" class="btn primary">Se connecter</button>
      </div>
      <p class="error hidden" id="gate-error"></p>
      <p class="muted gate-hint" id="gate-hint">Pas encore inscrit ? Demande à un admin d'ajouter ton email à la liste, puis clique « Créer un compte ».</p>
    </div>
  </div>

  <!-- App -->
  <div id="app" class="hidden">
    <header class="topbar">
      <a href="#/mon-suivi" class="brand">
        <img class="brand-logo" src="assets/logo/tpecsr-logo.svg" alt="TP ECSR" />
      </a>

      <nav class="tabs" id="tabs"></nav>

      <div class="topbar-actions">
        <div id="admin-slot"></div>
        <button id="today-btn" class="ghost-btn" title="Aujourd'hui au planning" aria-label="Aller à la journée d'aujourd'hui au planning"></button>
        <button id="refresh-btn" class="ghost-btn" title="Actualiser" aria-label="Actualiser"></button>
      </div>
    </header>

    <main id="view"></main>

    <div id="toast" class="toast hidden"></div>
  </div>

  <script type="module" src="js/main.js?v=20260723e"></script>
</body>
</html>
