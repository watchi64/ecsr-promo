<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1F4E78" />
  <title>Promo ECSR — Suivi des passages</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Ctext y='20' font-size='20'%3E🚗%3C/text%3E%3C/svg%3E" />
</head>
<body>

  <!-- Password gate -->
  <div id="gate" class="gate hidden">
    <div class="gate-card">
      <h1>🚗 Promo ECSR</h1>
      <p class="muted" id="gate-subtitle">Mot de passe de la promo</p>
      <input type="password" id="gate-input" placeholder="••••••••" autocomplete="off" autofocus />
      <button id="gate-submit" class="btn primary">Entrer</button>
      <p class="error hidden" id="gate-error">Mot de passe incorrect</p>
    </div>
  </div>

  <!-- App -->
  <div id="app" class="hidden">
    <header class="topbar">
      <div class="brand">
        <span class="logo">🚗</span>
        <span class="title">Promo ECSR</span>
      </div>
      <nav class="tabs">
        <a href="#/dashboard" class="tab" data-route="dashboard">📊 <span>Tableau&nbsp;de&nbsp;bord</span></a>
        <a href="#/planning" class="tab" data-route="planning">📅 <span>Planning</span></a>
        <a href="#/passages" class="tab" data-route="passages">📝 <span>Passages</span></a>
        <a href="#/config" class="tab" data-route="config">⚙️ <span>Config</span></a>
      </nav>
      <button id="refresh-btn" class="icon-btn" title="Rafraîchir">⟳</button>
    </header>

    <main id="view"></main>

    <div id="toast" class="toast hidden"></div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
