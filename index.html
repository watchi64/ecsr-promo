<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0F1419" />
  <title>Promo ECSR — Suivi des passages</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2310B981' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M5 17H3v-5l2-5h14l2 5v5h-2M5 17a2 2 0 1 0 4 0 2 2 0 0 0-4 0Zm10 0a2 2 0 1 0 4 0 2 2 0 0 0-4 0Z'/%3E%3C/svg%3E" />
</head>
<body>

  <!-- Password gate -->
  <div id="gate" class="gate hidden">
    <div class="gate-bg" aria-hidden="true"></div>
    <div class="gate-card">
      <div class="gate-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 17H3v-5l2-5h14l2 5v5h-2M5 17a2 2 0 1 0 4 0 2 2 0 0 0-4 0Zm10 0a2 2 0 1 0 4 0 2 2 0 0 0-4 0ZM7 12h10"/>
        </svg>
      </div>
      <p class="eyebrow">Promo ECSR · 2026</p>
      <h1>Bienvenue</h1>
      <p class="muted" id="gate-subtitle">Mot de passe partagé</p>
      <div class="gate-form">
        <input type="password" id="gate-input" placeholder="••••••••" autocomplete="off" autofocus />
        <button id="gate-submit" class="btn primary">Entrer</button>
      </div>
      <p class="error hidden" id="gate-error">Mot de passe incorrect</p>
    </div>
  </div>

  <!-- App -->
  <div id="app" class="hidden">
    <header class="topbar">
      <a href="#/dashboard" class="brand">
        <span class="brand-mark">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 17H3v-5l2-5h14l2 5v5h-2M5 17a2 2 0 1 0 4 0 2 2 0 0 0-4 0Zm10 0a2 2 0 1 0 4 0 2 2 0 0 0-4 0Z"/>
          </svg>
        </span>
        <span class="brand-text">
          <span class="brand-title">Promo ECSR</span>
          <span class="brand-sub">Suivi des passages</span>
        </span>
      </a>

      <nav class="tabs" id="tabs"></nav>

      <div class="topbar-actions">
        <div id="admin-slot"></div>
        <button id="refresh-btn" class="ghost-btn" title="Actualiser" aria-label="Actualiser"></button>
      </div>
    </header>

    <main id="view"></main>

    <div id="toast" class="toast hidden"></div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
