<!doctype html>
<html lang="fr" data-accent="brique">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1A1612" />
  <meta name="referrer" content="no-referrer" />
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' https://esm.sh;
    connect-src 'self' https://*.supabase.co https://esm.sh;
    img-src 'self' data:;
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src 'self' https://fonts.gstatic.com data:;
    base-uri 'self';
    form-action 'self';
    frame-ancestors 'none';
  ">
  <title>TP ECSR App</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="assets/logo/tpecsr-logo.svg" type="image/svg+xml" />
</head>
<body>

  <!-- Password gate -->
  <div id="gate" class="gate hidden">
    <div class="gate-bg" aria-hidden="true"></div>
    <div class="gate-card">
      <img class="gate-logo" src="assets/logo/tpecsr-logo.svg" alt="TP ECSR" />
      <p class="eyebrow">Promo · 2026</p>
      <h1>Bienvenue</h1>
      <p class="muted" id="gate-subtitle">Connecte-toi avec ton compte</p>
      <button id="gate-google" class="btn-google">
        <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
          <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
          <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
          <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
        </svg>
        <span>Continuer avec Google</span>
      </button>
      <p class="gate-sep" aria-hidden="true"><span>ou par email</span></p>
      <div class="gate-form">
        <input type="email" id="gate-input" placeholder="ton.email@exemple.fr" autocomplete="email" />
        <button id="gate-submit" class="btn primary">Lien magique</button>
      </div>
      <p class="error hidden" id="gate-error">Email invalide</p>
    </div>
  </div>

  <!-- App -->
  <div id="app" class="hidden">
    <header class="topbar">
      <a href="#/dashboard" class="brand">
        <img class="brand-logo" src="assets/logo/tpecsr-logo.svg" alt="TP ECSR" />
      </a>

      <nav class="tabs" id="tabs"></nav>

      <div class="topbar-actions">
        <div id="admin-slot"></div>
        <button id="refresh-btn" class="ghost-btn" title="Actualiser" aria-label="Actualiser"></button>
      </div>
    </header>

    <main id="view"></main>

    <div id="toast" class="toast hidden"></div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
