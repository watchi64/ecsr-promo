<!doctype html>
<html lang="fr" data-accent="brique">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1A1612" />
  <title>TP ECSR — Promo & suivi</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="assets/logo/tpecsr-logo.svg" type="image/svg+xml" />
</head>
<body>

  <!-- Password gate -->
  <div id="gate" class="gate hidden">
    <div class="gate-bg" aria-hidden="true"></div>
    <div class="gate-card">
      <img class="gate-logo" src="assets/logo/tpecsr-logo.svg" alt="TP ECSR" />
      <p class="eyebrow">Promo · 2026</p>
      <h1>Bienvenue</h1>
      <p class="muted" id="gate-subtitle">Mot de passe partagé</p>
      <div class="gate-form">
        <input type="password" id="gate-input" placeholder="••••••••" autocomplete="off" autofocus />
        <button id="gate-submit" class="btn primary">Entrer</button>
      </div>
      <p class="error hidden" id="gate-error">Mot de passe incorrect</p>
    </div>
  </div>

  <!-- App -->
  <div id="app" class="hidden">
    <header class="topbar">
      <a href="#/dashboard" class="brand">
        <img class="brand-logo" src="assets/logo/tpecsr-logo.svg" alt="TP ECSR" />
      </a>

      <nav class="tabs" id="tabs"></nav>

      <div class="topbar-actions">
        <div id="admin-slot"></div>
        <button id="refresh-btn" class="ghost-btn" title="Actualiser" aria-label="Actualiser"></button>
      </div>
    </header>

    <main id="view"></main>

    <div id="toast" class="toast hidden"></div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
